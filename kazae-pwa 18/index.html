<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kazaé">
    <meta name="theme-color" content="#5B4FFF">
    <title>Kazaé — Maison & Famille</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        
        /* SPLASH SCREEN */
        .splash {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .splash-logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        .splash-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .splash.hidden {
            display: none;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        /* AUTH SCREEN */
        .auth-screen {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .auth-screen.active {
            display: block;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 15px;
        }
        
        .auth-logo-text {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        
        .auth-subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E0E0E0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #5B4FFF;
            box-shadow: 0 0 0 3px rgba(91, 79, 255, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(91, 79, 255, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #5B4FFF;
            border: 2px solid #5B4FFF;
        }
        
        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
        
        .toggle-auth button {
            background: none;
            border: none;
            color: #5B4FFF;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }
        
        .error {
            background: #FFE0E0;
            color: #CC0000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .error.show {
            display: block;
        }
        
        /* APP SCREEN */
        .app-screen {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            min-height: 600px;
        }
        
        .app-screen.active {
            display: flex;
            flex-direction: column;
        }
        
        .app-header {
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .app-header h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .app-header p {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .app-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .welcome-message {
            background: #F0F0FF;
            border-left: 4px solid #5B4FFF;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .user-info {
            background: #F9F9F9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .user-info .user-email {
            color: #999;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .btn-logout {
            background: #FF6B6B;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splash" class="splash">
        <div class="splash-logo">🏠</div>
        <div class="splash-text">Kazaé</div>
    </div>
    
    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-logo">
            <div class="auth-logo-icon">🏠</div>
            <div class="auth-logo-text">Kazaé</div>
        </div>
        <div class="auth-subtitle">Maison & Famille</div>
        
        <div id="errorMsg" class="error"></div>
        
        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Connexion</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Se connecter</button>
            <div class="toggle-auth">
                Pas de compte ? <button onclick="toggleAuth()">S'inscrire</button>
            </div>
        </div>
        
        <!-- SIGNUP FORM -->
        <div id="signupForm" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Création de compte</h2>
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="signupName" placeholder="Charlène">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="signupPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirmer mot de passe</label>
                <input type="password" id="signupPasswordConfirm" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="handleSignup()">Créer un compte</button>
            <div class="toggle-auth">
                Déjà inscrit ? <button onclick="toggleAuth()">Se connecter</button>
            </div>
        </div>
    </div>
    
    <!-- APP SCREEN -->
    <div id="appScreen" class="app-screen">
        <div class="app-header">
            <h1>Kazaé</h1>
            <p id="userGreeting">Bienvenue</p>
        </div>
        <div class="app-content">
            <div class="welcome-message">
                ✨ Firebase synchronisé et actif !
            </div>
            <div class="user-info">
                <div class="user-email" id="displayEmail"></div>
                <button class="btn-logout" onclick="handleLogout()">Se déconnecter</button>
            </div>
            <div class="loading">
                Application chargée avec succès ! 🎉
            </div>
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

    <script>
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyCkNjYPaqIEEUDOEcFdBWcssShAqsXdA-Q",
            authDomain: "kazae-44515.firebaseapp.com",
            projectId: "kazae-44515",
            storageBucket: "kazae-44515.firebasestorage.app",
            messagingSenderId: "358690912309",
            appId: "1:358690912309:web:86ed1a8129f371fd80197c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== STATE =====
        let currentUser = null;
        let authMode = 'login'; // 'login' or 'signup'

        // ===== INIT =====
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('authScreen').classList.add('active');
            }, 2000);
            
            // Check if user is already logged in
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    showAppScreen();
                }
            });
        });

        // ===== AUTH FUNCTIONS =====
        function toggleAuth() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('loginForm').style.display = authMode === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = authMode === 'signup' ? 'block' : 'none';
            clearError();
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.classList.add('show');
        }

        function clearError() {
            document.getElementById('errorMsg').classList.remove('show');
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                currentUser = auth.currentUser;
                showAppScreen();
            } catch (error) {
                let msg = 'Erreur de connexion';
                if (error.code === 'auth/user-not-found') msg = 'Email non trouvé';
                if (error.code === 'auth/wrong-password') msg = 'Mot de passe incorrect';
                showError(msg);
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupPasswordConfirm').value;
            
            if (!name || !email || !password || !confirmPassword) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }
            
            if (password.length < 6) {
                showError('Le mot de passe doit faire au moins 6 caractères');
                return;
            }
            
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                currentUser = result.user;
                
                // Create user profile in Firestore
                await db.collection('users').doc(currentUser.uid).set({
                    name: name,
                    email: email,
                    createdAt: new Date(),
                    tasks: [],
                    members: []
                });
                
                showAppScreen();
            } catch (error) {
                let msg = 'Erreur lors de la création';
                if (error.code === 'auth/email-already-in-use') msg = 'Email déjà utilisé';
                if (error.code === 'auth/invalid-email') msg = 'Email invalide';
                showError(msg);
            }
        }

        function handleLogout() {
            auth.signOut();
            currentUser = null;
            document.getElementById('appScreen').classList.remove('active');
            document.getElementById('authScreen').classList.add('active');
            
            // Reset forms
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('signupName').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupPasswordConfirm').value = '';
            
            authMode = 'login';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            clearError();
        }

        function showAppScreen() {
            document.getElementById('authScreen').classList.remove('active');
            document.getElementById('appScreen').classList.add('active');
            
            if (currentUser && currentUser.email) {
                document.getElementById('userGreeting').textContent = 'Bonjour ' + (currentUser.displayName || currentUser.email.split('@')[0]) + ' ! 👋';
                document.getElementById('displayEmail').textContent = 'Email : ' + currentUser.email;
            }
        }
    </script>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
