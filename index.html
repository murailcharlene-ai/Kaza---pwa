<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazaé Firebase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container { 
            max-width: 420px; 
            width: 100%; 
        }
        
        /* SPLASH */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        #splash.hidden {
            display: none !important;
        }
        
        .splash-icon { 
            font-size: 100px; 
            margin-bottom: 30px; 
        }
        
        .splash-text { 
            color: white; 
            font-size: 32px; 
            font-weight: bold;
        }
        
        /* ÉCRANS */
        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .screen.visible {
            display: block;
            opacity: 1;
        }
        
        /* ÉCRAN AUTH */
        .auth-screen {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .auth-screen h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #5B4FFF;
            box-shadow: 0 0 0 4px rgba(91, 79, 255, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(91, 79, 255, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-logout {
            background: #FF6B6B;
        }
        
        .error-message {
            background: #FFE0E0;
            color: #CC0000;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* ÉCRAN APP */
        .app-screen {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .app-screen h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .app-screen p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        /* DEBUG */
        .debug {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #0F0;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            max-width: 200px;
            max-height: 100px;
            overflow: auto;
            font-family: monospace;
            display: none;
        }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-icon">🏠</div>
        <div class="splash-text">Kazaé</div>
    </div>
    
    <!-- ÉCRAN CONNEXION -->
    <div class="container screen" id="authScreen">
        <div class="auth-screen">
            <h2>Connexion</h2>
            
            <div id="errorMsg" class="error-message"></div>
            
            <div class="form-group">
                <label>Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="test@test.com"
                    autocomplete="off"
                >
            </div>
            
            <div class="form-group">
                <label>Mot de passe</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="123456"
                    autocomplete="off"
                >
            </div>
            
            <button class="btn" id="loginBtn">Se connecter</button>
        </div>
    </div>
    
    <!-- ÉCRAN APP -->
    <div class="container screen" id="appScreen">
        <div class="app-screen">
            <h1>Kazaé ✅</h1>
            <p id="userDisplay"></p>
            <button class="btn btn-logout" id="logoutBtn">Se déconnecter</button>
        </div>
    </div>
    
    <!-- DEBUG CONSOLE -->
    <div class="debug" id="debugLog"></div>
    
    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    
    <!-- APPLICATION -->
    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let auth = null;
        let appReady = false;
        
        // ============================================
        // CONFIGURATION FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCkNjYPaqIEEUDOEcFdBWcssShAqsXdA-Q",
            authDomain: "kazae-44515.firebaseapp.com",
            projectId: "kazae-44515",
            storageBucket: "kazae-44515.firebasestorage.app",
            messagingSenderId: "358690912309",
            appId: "1:358690912309:web:86ed1a8129f371fd80197c"
        };
        
        // ============================================
        // INITIALISATION - ATTENDRE QUE FIREBASE SE CHARGE
        // ============================================
        function initializeApp() {
            try {
                // 1. Initialiser Firebase
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                
                // 2. S'assurer que les événements sont attachés MAINTENANT
                attachEventListeners();
                
                // 3. Marquer comme prêt
                appReady = true;
                
                // 4. Afficher l'écran de connexion après 2 secondes
                setTimeout(() => {
                    const splash = document.getElementById('splash');
                    splash.classList.add('hidden');
                    showAuthScreen();
                }, 2000);
                
                // 5. Écouter les changements d'auth
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        showAppScreen(user.email);
                    } else {
                        showAuthScreen();
                    }
                });
                
            } catch (error) {
                console.error("Erreur lors de l'initialisation:", error);
            }
        }
        
        // ============================================
        // ATTACHER LES ÉVÉNEMENTS AUX BOUTONS
        // ============================================
        function attachEventListeners() {
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (loginBtn) {
                loginBtn.addEventListener('click', handleLogin);
            }
            
            if (logoutBtn) {
                logoutBtn.addEventListener('click', handleLogout);
            }
        }
        
        // ============================================
        // FONCTION: SE CONNECTER
        // ============================================
        function handleLogin() {
            if (!auth || !appReady) {
                showError("L'app n'est pas prête. Rafraîchis la page.");
                return;
            }
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            // Désactiver le bouton pendant la connexion
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Connexion en cours...';
            
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Succès
                    clearForm();
                    showAppScreen(email);
                })
                .catch((error) => {
                    // Erreur
                    let errorMessage = 'Erreur de connexion';
                    
                    if (error.code === 'auth/user-not-found') {
                        errorMessage = 'Cet email n\'existe pas';
                    } else if (error.code === 'auth/wrong-password') {
                        errorMessage = 'Mot de passe incorrect';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = 'Email invalide';
                    } else {
                        errorMessage = error.message;
                    }
                    
                    showError(errorMessage);
                    
                    // Réactiver le bouton
                    btn.disabled = false;
                    btn.textContent = 'Se connecter';
                });
        }
        
        // ============================================
        // FONCTION: SE DÉCONNECTER
        // ============================================
        function handleLogout() {
            if (!auth) return;
            
            auth.signOut()
                .then(() => {
                    clearForm();
                    showAuthScreen();
                })
                .catch((error) => {
                    showError('Erreur lors de la déconnexion');
                });
        }
        
        // ============================================
        // AFFICHAGE: ÉCRAN CONNEXION
        // ============================================
        function showAuthScreen() {
            const authScreen = document.getElementById('authScreen');
            const appScreen = document.getElementById('appScreen');
            
            if (authScreen) {
                authScreen.classList.add('visible');
            }
            if (appScreen) {
                appScreen.classList.remove('visible');
            }
        }
        
        // ============================================
        // AFFICHAGE: ÉCRAN APP
        // ============================================
        function showAppScreen(email) {
            const authScreen = document.getElementById('authScreen');
            const appScreen = document.getElementById('appScreen');
            const userDisplay = document.getElementById('userDisplay');
            
            if (userDisplay) {
                userDisplay.textContent = 'Email: ' + email;
            }
            
            if (authScreen) {
                authScreen.classList.remove('visible');
            }
            if (appScreen) {
                appScreen.classList.add('visible');
            }
        }
        
        // ============================================
        // AFFICHAGE: MESSAGE D'ERREUR
        // ============================================
        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
                
                setTimeout(() => {
                    errorEl.classList.remove('show');
                }, 5000);
            }
        }
        
        // ============================================
        // UTILITAIRE: VIDER LE FORMULAIRE
        // ============================================
        function clearForm() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }
        
        // ============================================
        // LANCER L'APP QUAND LE DOM EST PRÊT
        // ============================================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
