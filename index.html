<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazaé Firebase DEBUG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { max-width: 400px; width: 100%; margin: 20px; }
        
        /* SPLASH */
        .splash {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            z-index: 9999;
        }
        .splash.hidden { display: none; }
        .splash-icon { font-size: 80px; margin-bottom: 20px; }
        .splash-text { color: white; font-size: 28px; font-weight: bold; }
        
        /* AUTH SCREEN */
        .screen { display: none; }
        .screen.active { display: block; }
        
        .auth-screen {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-screen h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #333;
        }
        
        /* FORM */
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-weight: 600; 
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #5B4FFF;
            box-shadow: 0 0 0 3px rgba(91, 79, 255, 0.1);
        }
        
        /* BUTTON */
        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            color: white;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-logout { background: #FF6B6B; }
        
        /* APP SCREEN */
        .app-screen {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .app-screen h1 { color: #333; margin-bottom: 20px; }
        .app-screen p { color: #666; margin-bottom: 30px; font-size: 18px; }
        
        /* ERROR */
        .error {
            background: #FFE0E0;
            color: #CC0000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .error.show { display: block; }
        
        /* DEBUG */
        .debug {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            margin-bottom: 20px;
            max-height: 100px;
            overflow-y: auto;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splash" class="splash">
        <div class="splash-icon">🏠</div>
        <div class="splash-text">Kazaé</div>
    </div>
    
    <!-- AUTH SCREEN -->
    <div class="container screen active" id="authScreenContainer">
        <div class="auth-screen">
            <h2>Connexion Firebase</h2>
            
            <div id="errorMsg" class="error"></div>
            <div id="debugMsg" class="debug" style="display:none;"></div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="inputEmail" placeholder="test@test.com">
            </div>
            
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="inputPassword" placeholder="123456">
            </div>
            
            <button class="btn" onclick="handleLogin()">Se connecter</button>
        </div>
    </div>
    
    <!-- APP SCREEN -->
    <div class="container screen" id="appScreenContainer">
        <div class="app-screen">
            <h1>Kazaé ✅</h1>
            <p id="userEmailDisplay"></p>
            <button class="btn btn-logout" onclick="handleLogout()">Se déconnecter</button>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

    <!-- MAIN SCRIPT -->
    <script>
        console.log("Script démarré");
        addDebug("✓ Script démarré");
        
        // Hide splash after 2 seconds
        setTimeout(function() {
            console.log("Masquage du splash screen");
            document.getElementById('splash').classList.add('hidden');
        }, 2000);

        // FIREBASE INIT
        const firebaseConfig = {
            apiKey: "AIzaSyCkNjYPaqIEEUDOEcFdBWcssShAqsXdA-Q",
            authDomain: "kazae-44515.firebaseapp.com",
            projectId: "kazae-44515",
            storageBucket: "kazae-44515.firebasestorage.app",
            messagingSenderId: "358690912309",
            appId: "1:358690912309:web:86ed1a8129f371fd80197c"
        };

        try {
            console.log("Initialisation Firebase...");
            addDebug("⏳ Init Firebase...");
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase initialisé ✓");
            addDebug("✓ Firebase OK");
        } catch (e) {
            console.log("Erreur Firebase:", e);
            addDebug("✗ Erreur Firebase: " + e.message);
        }

        const auth = firebase.auth();

        // LOGIN FUNCTION
        function handleLogin() {
            console.log("handleLogin appelée");
            addDebug("⏳ Connexion...");
            
            const email = document.getElementById('inputEmail').value.trim();
            const password = document.getElementById('inputPassword').value;

            console.log("Email:", email);
            console.log("Password length:", password.length);
            addDebug("Email: " + email);

            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }

            try {
                auth.signInWithEmailAndPassword(email, password)
                    .then(function(result) {
                        console.log('Login success:', result.user.email);
                        addDebug("✓ Connexion OK");
                        showAuthScreen(false);
                        displayUserEmail(email);
                    })
                    .catch(function(error) {
                        console.log('Login error:', error.code, error.message);
                        addDebug("✗ Erreur: " + error.message);
                        showError('Erreur: ' + error.message);
                    });
            } catch (e) {
                console.log("Exception:", e);
                addDebug("✗ Exception: " + e.message);
            }
        }

        // LOGOUT FUNCTION
        function handleLogout() {
            auth.signOut()
                .then(function() {
                    console.log('Logout success');
                    showAuthScreen(true);
                    clearForm();
                })
                .catch(function(error) {
                    console.log('Logout error:', error);
                });
        }

        // UI FUNCTIONS
        function showAuthScreen(show) {
            const authContainer = document.getElementById('authScreenContainer');
            const appContainer = document.getElementById('appScreenContainer');
            
            if (show) {
                if (authContainer) authContainer.classList.add('active');
                if (appContainer) appContainer.classList.remove('active');
            } else {
                if (authContainer) authContainer.classList.remove('active');
                if (appContainer) appContainer.classList.add('active');
            }
        }

        function displayUserEmail(email) {
            const emailDisplay = document.getElementById('userEmailDisplay');
            if (emailDisplay) {
                emailDisplay.textContent = 'Email: ' + email;
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
                setTimeout(function() {
                    errorEl.classList.remove('show');
                }, 5000);
            }
        }

        function clearForm() {
            document.getElementById('inputEmail').value = '';
            document.getElementById('inputPassword').value = '';
        }

        function addDebug(msg) {
            const debugEl = document.getElementById('debugMsg');
            if (debugEl) {
                debugEl.style.display = 'block';
                debugEl.textContent += msg + '\n';
            }
        }

        // AUTH STATE LISTENER
        auth.onAuthStateChanged(function(user) {
            if (user) {
                console.log('User logged in:', user.email);
                addDebug("✓ User: " + user.email);
                showAuthScreen(false);
                displayUserEmail(user.email);
            } else {
                console.log('User logged out');
                addDebug("Log out détecté");
                showAuthScreen(true);
            }
        });

        console.log("Setup complet");
        addDebug("✓ Setup complet");
    </script>
</body>
</html>
