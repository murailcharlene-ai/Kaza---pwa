<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazaé</title>

<style>
body {
    font-family: sans-serif;
    background: linear-gradient(135deg, #5B4FFF, #7C6EFF);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 400px;
}
input, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}
.task {
    display:flex;
    justify-content:space-between;
    background:#eee;
    padding:10px;
    margin-top:5px;
}
</style>
</head>

<body>

<div id="auth" class="container">
    <h2>Connexion</h2>
    <input id="emailInput" placeholder="email">
    <input id="passwordInput" type="password" placeholder="password">
    <button onclick="login()">Connexion</button>
</div>

<div id="app" class="container" style="display:none;">
    <h2>Kazaé</h2>
    <div id="user"></div>

    <input id="taskInput" placeholder="Nouvelle tâche">
    <button onclick="addTask()">Ajouter</button>

    <div id="tasks"></div>

    <button onclick="logout()">Déconnexion</button>
</div>

<script>
const URL = 'https://aspmfjmkwzwytiknqlih.supabase.co';

const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzcG1mam1rd3p3eXRpa25xbGloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mzg5MDYsImV4cCI6MjA5MDExNDkwNn0.DkemPuJwddk5dTfKOSaqn7f6SNYtWD4t2zlCUWlNUOg';

let userEmail = null;

// LOGIN
async function login() {
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;

    const res = await fetch(URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY
        },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.access_token) {
        localStorage.setItem('email', email);
        userEmail = email;
        startApp();
    } else {
        alert('Erreur login');
    }
}

// START
function startApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    userEmail = localStorage.getItem('email');
    document.getElementById('user').innerText = userEmail;

    loadTasks();
}

// LOAD TASKS
async function loadTasks() {
    const res = await fetch(URL + '/rest/v1/tasks?user_email=eq.' + userEmail, {
        headers: {
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY
        }
    });

    const data = await res.json();

    const container = document.getElementById('tasks');
    container.innerHTML = '';

    data.forEach(t => {
        const div = document.createElement('div');
        div.className = 'task';
        div.innerHTML = t.title + ' <button onclick="deleteTask(\'' + t.id + '\')">X</button>';
        container.appendChild(div);
    });
}

// ADD
async function addTask() {
    const title = document.getElementById('taskInput').value;

    await fetch(URL + '/rest/v1/tasks', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY
        },
        body: JSON.stringify({
            title,
            user_email: userEmail
        })
    });

    document.getElementById('taskInput').value = '';
    loadTasks();
}

// DELETE
async function deleteTask(id) {
    await fetch(URL + '/rest/v1/tasks?id=eq.' + id, {
        method: 'DELETE',
        headers: {
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY
        }
    });

    loadTasks();
}

// LOGOUT
function logout() {
    localStorage.clear();
    location.reload();
}

// AUTO LOGIN
if (localStorage.getItem('email')) {
    startApp();
}
</script>

</body>
</html>
