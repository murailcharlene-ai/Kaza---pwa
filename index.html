<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazaé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #5B4FFF, #7C6EFF);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #5B4FFF, #7C6EFF);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        #splash.hide { display: none !important; }
        .icon { font-size: 100px; margin-bottom: 20px; }
        .text { color: white; font-size: 36px; font-weight: bold; }
        .container { background: white; border-radius: 20px; padding: 40px 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 420px; width: 100%; display: none; }
        .container.show { display: block; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #E0E0E0; border-radius: 10px; font-size: 16px; }
        input:focus { outline: none; border-color: #5B4FFF; box-shadow: 0 0 0 3px rgba(91, 79, 255, 0.1); }
        button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; background: linear-gradient(135deg, #5B4FFF, #7C6EFF); color: white; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .logout { background: #FF6B6B; margin-top: 20px; }
        .error { background: #FFE0E0; color: #CC0000; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 14px; }
        .error.show { display: block; }
        .user-display { text-align: center; color: #666; margin-bottom: 30px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="splash">
        <div class="icon">🏠</div>
        <div class="text">Kazaé</div>
    </div>
    
    <div id="auth" class="container show">
        <h1>Connexion</h1>
        <div id="errorMsg" class="error"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="test@test.com">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="passwordInput" placeholder="123456">
        </div>
        <button id="loginBtn">Se connecter</button>
    </div>
    
    <div id="app" class="container">
        <h1>Kazaé ✅</h1>
        <div class="user-display" id="userDisplay"></div>
        <button class="logout" id="logoutBtn">Se déconnecter</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://aspmfjmkwzwytiknqlih.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hH3MLBYsjKjM6KkQYpxjpQ_GWqIJtSQ';
        
        let userEmail = null;
        
        // Splash disparaît
        setTimeout(function() {
            document.getElementById('splash').classList.add('hide');
        }, 500);
        
        // Vérifier si connecté au chargement
        window.addEventListener('load', function() {
            const token = localStorage.getItem('supabase_token');
            const email = localStorage.getItem('user_email');
            if (token && email) {
                showApp(email);
            }
        });
        
        // Bouton connexion
        document.getElementById('loginBtn').addEventListener('click', function() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                showError('Remplis tous les champs');
                return;
            }
            
            this.disabled = true;
            this.textContent = 'Connexion...';
            
            // API REST Supabase
            fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').textContent = 'Se connecter';
                
                if (data.error) {
                    showError('Email ou mot de passe incorrect');
                } else if (data.access_token) {
                    // Sauvegarde le token
                    localStorage.setItem('supabase_token', data.access_token);
                    localStorage.setItem('user_email', email);
                    showApp(email);
                } else {
                    showError('Erreur de connexion');
                }
            })
            .catch(function(error) {
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').textContent = 'Se connecter';
                showError('Erreur réseau');
            });
        });
        
        // Bouton déconnexion
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('supabase_token');
            localStorage.removeItem('user_email');
            
            document.getElementById('auth').classList.add('show');
            document.getElementById('app').classList.remove('show');
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
        });
        
        function showApp(email) {
            document.getElementById('auth').classList.remove('show');
            document.getElementById('app').classList.add('show');
            document.getElementById('userDisplay').textContent = 'Email: ' + email;
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() {
                el.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
