<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazaé Firebase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { max-width: 400px; width: 100%; margin: 20px; }
        
        /* SPLASH */
        .splash {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            z-index: 9999;
        }
        .splash.hidden { display: none; }
        .splash-icon { font-size: 80px; margin-bottom: 20px; }
        .splash-text { color: white; font-size: 28px; font-weight: bold; }
        
        /* AUTH SCREEN */
        .screen { display: none; }
        .screen.active { display: block; }
        
        .auth-screen {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-screen h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #333;
        }
        
        /* FORM */
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-weight: 600; 
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #5B4FFF;
            box-shadow: 0 0 0 3px rgba(91, 79, 255, 0.1);
        }
        
        /* BUTTON */
        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            color: white;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-logout { background: #FF6B6B; }
        
        /* APP SCREEN */
        .app-screen {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .app-screen h1 { color: #333; margin-bottom: 20px; }
        .app-screen p { color: #666; margin-bottom: 30px; font-size: 18px; }
        
        /* ERROR */
        .error {
            background: #FFE0E0;
            color: #CC0000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splash" class="splash">
        <div class="splash-icon">🏠</div>
        <div class="splash-text">Kazaé</div>
    </div>
    
    <!-- AUTH SCREEN -->
    <div class="container screen active" id="authScreenContainer">
        <div class="auth-screen">
            <h2>Connexion Firebase</h2>
            
            <div id="errorMsg" class="error"></div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="inputEmail" placeholder="test@example.com">
            </div>
            
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="inputPassword" placeholder="123456">
            </div>
            
            <button class="btn" onclick="handleLogin()">Se connecter</button>
        </div>
    </div>
    
    <!-- APP SCREEN -->
    <div class="container screen" id="appScreenContainer">
        <div class="app-screen">
            <h1>Kazaé ✅</h1>
            <p id="userEmailDisplay"></p>
            <button class="btn btn-logout" onclick="handleLogout()">Se déconnecter</button>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

    <!-- MAIN SCRIPT -->
    <script>
        // Attendre que Firebase SDK soit chargé
        function initApp() {
            // SPLASH SCREEN TIMER - Doit s'exécuter dès que possible
            setTimeout(function() {
                const splash = document.getElementById('splash');
                if (splash) {
                    splash.classList.add('hidden');
                }
            }, 2000);

            // FIREBASE CONFIG
            const firebaseConfig = {
                apiKey: "AIzaSyCkNjYPaqIEEUDOEcFdBWcssShAqsXdA-Q",
                authDomain: "kazae-44515.firebaseapp.com",
                projectId: "kazae-44515",
                storageBucket: "kazae-44515.firebasestorage.app",
                messagingSenderId: "358690912309",
                appId: "1:358690912309:web:86ed1a8129f371fd80197c"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            // LOGIN FUNCTION
            window.handleLogin = function() {
                const email = document.getElementById('inputEmail').value.trim();
                const password = document.getElementById('inputPassword').value;

                if (!email || !password) {
                    showError('Veuillez remplir tous les champs');
                    return;
                }

                auth.signInWithEmailAndPassword(email, password)
                    .then(function(result) {
                        showAuthScreen(false);
                        displayUserEmail(email);
                    })
                    .catch(function(error) {
                        showError('Email ou mot de passe incorrect');
                    });
            };

            // LOGOUT FUNCTION
            window.handleLogout = function() {
                auth.signOut()
                    .then(function() {
                        showAuthScreen(true);
                        clearForm();
                    })
                    .catch(function(error) {
                        console.log('Logout error:', error);
                    });
            };

            // UI FUNCTIONS
            function showAuthScreen(show) {
                const authContainer = document.getElementById('authScreenContainer');
                const appContainer = document.getElementById('appScreenContainer');
                
                if (show) {
                    if (authContainer) authContainer.classList.add('active');
                    if (appContainer) appContainer.classList.remove('active');
                } else {
                    if (authContainer) authContainer.classList.remove('active');
                    if (appContainer) appContainer.classList.add('active');
                }
            }

            function displayUserEmail(email) {
                const emailDisplay = document.getElementById('userEmailDisplay');
                if (emailDisplay) {
                    emailDisplay.textContent = 'Email: ' + email;
                }
            }

            function showError(message) {
                const errorEl = document.getElementById('errorMsg');
                if (errorEl) {
                    errorEl.textContent = message;
                    errorEl.classList.add('show');
                    setTimeout(function() {
                        errorEl.classList.remove('show');
                    }, 5000);
                }
            }

            function clearForm() {
                document.getElementById('inputEmail').value = '';
                document.getElementById('inputPassword').value = '';
            }

            // AUTH STATE LISTENER
            auth.onAuthStateChanged(function(user) {
                if (user) {
                    showAuthScreen(false);
                    displayUserEmail(user.email);
                } else {
                    showAuthScreen(true);
                }
            });
        }

        // Lancer l'app quand le DOM est prêt
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
