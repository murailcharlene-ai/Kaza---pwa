        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }

        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .logout { background: #FF6B6B; margin-top: 20px; }
        .error { background: #FFE0E0; color: #CC0000; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 14px; }
        .error.show { display: block; }
        .user-display { text-align: center; color: #666; margin-bottom: 30px; font-size: 16px; }
    </style>
</head>
