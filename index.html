<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5B4FFF">
    <title>Kazaé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #5B4FFF, #7C6EFF); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .splash { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #5B4FFF, #7C6EFF); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .splash-logo { width: 100px; height: 100px; background: white; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 20px; }
        .splash-text { color: white; font-size: 24px; font-weight: bold; }
        .splash.hidden { display: none; }
        .auth-screen { display: none; background: white; border-radius: 20px; padding: 30px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 480px; margin: 20px; }
        .auth-screen.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #E0E0E0; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border: 0; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; background: linear-gradient(135deg, #5B4FFF, #7C6EFF); color: white; }
        .app-screen { display: none; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 480px; margin: 20px; }
        .app-screen.active { display: block; }
        .app-header { background: linear-gradient(135deg, #5B4FFF, #7C6EFF); color: white; padding: 20px; border-radius: 20px 20px 0 0; margin: -30px -30px 20px -30px; }
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-logo">🏠</div>
        <div class="splash-text">Kazaé</div>
    </div>
    
    <div id="authScreen" class="auth-screen">
        <h2 style="text-align: center; margin-bottom: 20px;">Connexion Firebase</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="test@example.com">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="password123">
        </div>
        <button class="btn" onclick="handleLogin()">Se connecter</button>
    </div>
    
    <div id="appScreen" class="app-screen">
        <div class="app-header">
            <h1>Kazaé</h1>
            <p id="userGreeting">Connecté ✅</p>
        </div>
        <p id="displayEmail" style="margin: 20px 0;"></p>
        <button class="btn" onclick="handleLogout()" style="background: #FF6B6B;">Se déconnecter</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCkNjYPaqIEEUDOEcFdBWcssShAqsXdA-Q",
            authDomain: "kazae-44515.firebaseapp.com",
            projectId: "kazae-44515",
            storageBucket: "kazae-44515.firebasestorage.app",
            messagingSenderId: "358690912309",
            appId: "1:358690912309:web:86ed1a8129f371fd80197c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('authScreen').classList.add('active');
            }, 2000);
        });

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then(user => {
                    document.getElementById('authScreen').classList.remove('active');
                    document.getElementById('appScreen').classList.add('active');
                    document.getElementById('displayEmail').textContent = 'Email: ' + email;
                })
                .catch(error => alert('Erreur: ' + error.message));
        }

        function handleLogout() {
            auth.signOut();
            document.getElementById('appScreen').classList.remove('active');
            document.getElementById('authScreen').classList.add('active');
        }
    </script>
</body>
</html>
