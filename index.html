<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazaé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #5B4FFF 0%, #7C6EFF 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .splash-icon { font-size: 100px; margin-bottom: 20px; }
        .splash-text { color: white; font-size: 36px; font-weight: bold; }
        
        .content {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .content.visible {
            opacity: 1;
        }
        
        h1 { color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="splash">
        <div class="splash-icon">🏠</div>
        <div class="splash-text">Kazaé</div>
    </div>
    
    <div class="content" id="content">
        <h1>Ça marche ! ✅</h1>
        <p>Le splash screen a disparu correctement</p>
    </div>
    
    <script>
        // SIMPLE : Attendre 2 secondes et faire disparaître le splash
        setTimeout(function() {
            console.log("2 secondes passées - enlever le splash");
            
            const splash = document.getElementById('splash');
            const content = document.getElementById('content');
            
            if (splash) {
                splash.classList.add('hidden');
                console.log("Splash marqué comme hidden");
            }
            
            if (content) {
                content.classList.add('visible');
                console.log("Content visible");
            }
        }, 2000);
    </script>
</body>
</html>
